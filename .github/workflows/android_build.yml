name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Java 17 (modern + stable)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # Create local.properties
      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> local.properties
          echo "GEMINI_DEBUG_KEY=${{ secrets.GEMINI_DEBUG_KEY }}" >> local.properties
          echo "ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}" >> local.properties

      # Decode Debug google-services.json
      - name: Load Debug Google Services
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_DEBUG }}
        run: |
          mkdir -p app/src/debug
          echo "$DATA" | base64 -di > app/src/debug/google-services.json
          cp app/src/debug/google-services.json app/google-services.json

      # Decode Release google-services.json
      - name: Load Release Google Services
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/release
          echo "$DATA" | base64 -di > app/src/release/google-services.json

      # Decode Keystore
      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1.2
        id: decode_keystore
        with:
          fileName: android_keystore.jks
          fileDir: app/keystore/
          encodedString: ${{ secrets.STORE_FILE }}

      # Create keystore.properties
      - name: Create keystore.properties
        run: |
          echo "KEY_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" > keystore.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "STORE_FILE=${{ steps.decode_keystore.outputs.filePath }}" >> keystore.properties

      # Run Debug Unit Tests (SAFE)
      - name: Run Unit Tests
        run: ./gradlew clean testDebugUnitTest

      # Upload test reports
      - name: Upload Unit Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
